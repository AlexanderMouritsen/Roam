<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Roam</title>
</head>
<body>
    <!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roam — Log in</title>
  <script src="/js/auth.js" defer></script>
  <link rel="stylesheet" href="/css/auth.css"/>
  <link rel="stylesheet" href="/css/global.css"/>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
        <div class="auth-logo">
          <img class="auth-logo-img" src="/assets/images/roam-logo-white-nobg.png" alt="Roam logo" />
        </div>

      <!-- Login / Signup tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" type="button">Log in</button>
        <button class="auth-tab"        id="tab-signup" type="button">Create account</button>
      </div>

      <!-- Login form -->
      <form class="auth-form" id="form-login" novalidate>
        <div class="field">
          <label class="field-label" for="login-email">Email</label>
          <input class="input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label class="field-label" for="login-password">Password</label>
          <input class="input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="message message-error"   id="login-error"></div>
        <div class="message message-success" id="login-success"></div>

        <button class="btn btn-primary btn-lg btn-full" type="submit" id="login-btn">
          Log in
        </button>
      </form>

      <!-- Signup form (hidden by default) -->
      <form class="auth-form" id="form-signup" novalidate hidden>
        <div class="field">
          <label class="field-label" for="signup-email">Email</label>
          <input class="input" type="email" id="signup-email" placeholder="you@example.com" autocomplete="username" required />
        </div>
        <div class="field">
          <label class="field-label" for="signup-password">Password</label>
          <input class="input" type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password" required />
        </div>

        <div class="message message-error"   id="signup-error"></div>
        <div class="message message-success" id="signup-success"></div>

        <button class="btn btn-primary btn-lg btn-full" type="submit" id="signup-btn">
          Create account
        </button>
      </form>

      <!-- Footer switch link -->
      <p class="auth-footer" id="auth-footer">
        Don't have an account?
        <button type="button" id="footer-switch">Sign up</button>
      </p>

    </div>
  </div>
</body>
</html>
</body>
</html>
